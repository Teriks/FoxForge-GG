name: Refresh game data

# Re-scrapes UNITE-DB and publishes a fresh data bundle + manifest to
# public/data. The remote-data channel is served by pages.yml on merge to main;
# this workflow opens a PR for review (never pushes directly to main).

on:
  schedule:
    - cron: "0 9 * * 1" # weekly, Monday 09:00 UTC
  workflow_dispatch:
    inputs:
      patch_version:
        description: "New patch version (leave blank to refresh the current patch)"
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install requests openpyxl
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - name: Scrape + normalize
        working-directory: tools/community
        env:
          PATCH_VERSION: ${{ github.event.inputs.patch_version }}
        run: |
          python3 fetch.py
          python3 normalize.py
          python3 normalize_as_boosts.py
      - name: Publish bundle + manifest to public/data
        run: |
          mkdir -p public/data
          rm -f public/data/patch-*.json
          PATCH=$(python3 -c "import json;print(json.load(open('src/data/patch-current.json'))['patchVersion'])")
          VER=$(python3 -c "import json;print(json.load(open('src/data/patch-current.json'))['lastUpdated'])")
          cp src/data/patch-current.json "public/data/patch-${PATCH}.json"
          python3 - "$PATCH" "$VER" <<'PY'
          import json, sys
          patch, ver = sys.argv[1], sys.argv[2]
          base = "https://aerokita.github.io/FoxForge-GG/data"
          json.dump({"version": ver, "patchVersion": patch, "url": f"{base}/patch-{patch}.json"},
                    open("public/data/manifest.json", "w"), indent=2)
          PY
      - name: Validate regenerated bundle
        run: |
          npx tsx src/data/verifyPatch.ts
          npm test
      - name: Summarize changes
        id: summary
        run: |
          python3 <<'PY'
          import json, subprocess, os

          def load_json(text):
              return json.loads(text) if text else None

          try:
              old_text = subprocess.check_output(
                  ["git", "show", "origin/main:src/data/patch-current.json"],
                  text=True,
              )
          except subprocess.CalledProcessError:
              old_text = ""

          new = json.load(open("src/data/patch-current.json"))
          old = load_json(old_text)

          if old is None:
              text = f"**baseline added** — patch {new['patchVersion']}, {len(new['pokemon'])} pokemon"
          else:
              def counts(b):
                  return len(b["pokemon"]), len(b["heldItems"]), len(b["emblems"]), len(b.get("battleItems") or [])

              op, oh, oe, ob = counts(old)
              np, nh, ne, nb = counts(new)
              text = (
                  f"**patchVersion:** {old['patchVersion']} → {new['patchVersion']}\n"
                  f"**pokemon:** {op} → {np} · **heldItems:** {oh} → {nh} · "
                  f"**emblems:** {oe} → {ne} · **battleItems:** {ob} → {nb}"
              )

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"text<<EOF\n{text}\nEOF\n")
          PY
      - name: Open data-refresh PR
        uses: peter-evans/create-pull-request@v6
        with:
          branch: data/auto-refresh
          commit-message: "chore(data): refresh UNITE data"
          title: "chore(data): refresh UNITE data"
          reviewers: AeroKita
          body: |
            Automated UNITE-DB data refresh.
            ${{ steps.summary.outputs.text }}
